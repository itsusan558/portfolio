<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | ITSU WORKS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #fafafa;
      --bg-surface: #ffffff;
      --bg-elevated: #f5f5f0;
      --bg-dark: #0f0f0f;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #999999;
      --accent-color: #2563eb;
      --accent-color-light: #3b82f6;
      --border: #e5e5e5;
      --font-sans: 'Inter', sans-serif;
      --font-jp: 'Zen Kaku Gothic New', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); line-height: 1.7; }
    ::selection { background: var(--accent-color); color: #fff; }
    a { color: var(--accent-color); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 1.25rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; }
    .nav-logo a { color: var(--text-primary); text-decoration: none; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.82rem; font-weight: 500; color: var(--text-secondary); text-decoration: none; }
    .nav-links a:hover { color: var(--accent-color); text-decoration: none; }
    .nav-links a.active { color: var(--accent-color); }
    .nav-cta {
      font-size: 0.8rem; font-weight: 600; color: #fff !important;
      background: var(--accent-color); padding: 0.5rem 1.2rem; border-radius: 6px;
    }

    /* ARTICLE */
    .article-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 8rem 2rem 6rem;
    }
    .article-back {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-size: 0.82rem; font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      text-decoration: none;
    }
    .article-back:hover { color: var(--accent-color); text-decoration: none; }
    .article-meta {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .article-category {
      font-size: 0.7rem; font-weight: 600;
      color: var(--accent-color);
      letter-spacing: 0.05em; text-transform: uppercase;
      background: rgba(37, 99, 235, 0.06);
      padding: 0.3rem 0.75rem; border-radius: 100px;
    }
    .article-date {
      font-family: var(--font-mono);
      font-size: 0.75rem; color: var(--text-muted);
    }
    .article-title {
      font-size: clamp(1.8rem, 3.5vw, 2.5rem);
      font-weight: 800; letter-spacing: -0.02em;
      line-height: 1.3; margin-bottom: 1.5rem;
    }
    .article-tags {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .article-tag {
      font-family: var(--font-mono);
      font-size: 0.65rem; color: var(--text-muted);
      background: var(--bg-elevated);
      padding: 0.25rem 0.6rem; border-radius: 4px;
    }

    /* ARTICLE BODY */
    .article-body {
      font-family: var(--font-jp);
      font-size: 1rem;
      color: var(--text-secondary);
      line-height: 2.2;
    }
    .article-body p { margin-bottom: 1.5rem; }
    .article-body h2 {
      font-family: var(--font-sans);
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.01em;
      margin: 3rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }
    .article-body h3 {
      font-family: var(--font-sans);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 2rem 0 0.75rem;
    }
    .article-body ul, .article-body ol {
      margin: 0 0 1.5rem 1.5rem;
    }
    .article-body li {
      margin-bottom: 0.5rem;
    }
    .article-body li strong {
      color: var(--text-primary);
    }
    .article-body strong { color: var(--text-primary); font-weight: 600; }
    .article-body code {
      font-family: var(--font-mono);
      font-size: 0.85em;
      background: var(--bg-elevated);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      color: var(--text-primary);
    }
    .article-body pre {
      background: var(--bg-dark);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      overflow-x: auto;
    }
    .article-body pre code {
      background: none;
      padding: 0;
      color: #e0e0e0;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    /* FOOTER NAV */
    .article-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .article-footer-back {
      font-size: 0.85rem; font-weight: 500;
      color: var(--accent-color);
      text-decoration: none;
    }
    .article-footer-back:hover { text-decoration: underline; }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 3rem;
      margin-top: 4rem;
    }
    .footer-inner {
      max-width: 720px; margin: 0 auto;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-copy { font-size: 0.72rem; color: var(--text-muted); }
    .footer-link { font-size: 0.72rem; color: var(--text-muted); text-decoration: none; }
    .footer-link:hover { color: var(--accent-color); text-decoration: none; }

    /* LOADING / ERROR */
    .article-loading, .article-error {
      text-align: center; padding: 4rem 2rem;
      color: var(--text-muted);
      font-family: var(--font-jp);
    }
    .article-error a { color: var(--accent-color); }

    @media (max-width: 768px) {
      .nav { padding: 1rem 1.5rem; }
      .nav-cta { display: none; }
      .article-footer { flex-direction: column; gap: 1rem; }
      .footer-inner { flex-direction: column; gap: 1rem; text-align: center; }
    }
    @media (max-width: 480px) {
      .nav-links { display: none; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><a href="index.html">ITSU WORKS</a></div>
  <ul class="nav-links">
    <li><a href="index.html#services">Services</a></li>
    <li><a href="index.html#works">Works</a></li>
    <li><a href="blog.html" class="active">Blog</a></li>
    <li><a href="index.html#about">About</a></li>
    <li><a href="index.html#contact" class="nav-cta">Contact</a></li>
  </ul>
</nav>

<article class="article-wrap" id="article">
  <div class="article-loading">読み込み中...</div>
</article>

<footer>
  <div class="footer-inner">
    <span class="footer-copy">&copy; 2026 ITSU WORKS. All rights reserved.</span>
    <a href="index.html" class="footer-link">&larr; トップに戻る</a>
  </div>
</footer>

<script>
  async function loadPost() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const container = document.getElementById('article');

    if (!id) {
      container.innerHTML = '<div class="article-error">記事が見つかりません。<br><a href="blog.html">ブログ一覧に戻る</a></div>';
      return;
    }

    const res = await fetch('posts.json');
    const posts = await res.json();
    const post = posts.find(p => p.id === id);

    if (!post) {
      container.innerHTML = '<div class="article-error">記事が見つかりません。<br><a href="blog.html">ブログ一覧に戻る</a></div>';
      return;
    }

    document.title = `${post.title} | ITSU WORKS Blog`;

    const date = new Date(post.date);
    const dateStr = `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
    const tags = post.tags.map(t => `<span class="article-tag">${t}</span>`).join('');

    // Find prev/next posts
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));
    const idx = posts.findIndex(p => p.id === id);
    const prev = idx < posts.length - 1 ? posts[idx + 1] : null;
    const next = idx > 0 ? posts[idx - 1] : null;

    container.innerHTML = `
      <a href="blog.html" class="article-back">&larr; ブログ一覧</a>
      <div class="article-meta">
        <span class="article-category">${post.category}</span>
        <span class="article-date">${dateStr}</span>
      </div>
      <h1 class="article-title">${post.title}</h1>
      <div class="article-tags">${tags}</div>
      <div class="article-body">${post.content}</div>
      <div class="article-footer">
        ${prev ? `<a href="post.html?id=${prev.id}" class="article-footer-back">&larr; ${prev.title}</a>` : '<span></span>'}
        ${next ? `<a href="post.html?id=${next.id}" class="article-footer-back">${next.title} &rarr;</a>` : '<span></span>'}
      </div>
    `;
  }

  loadPost();
</script>

</body>
</html>
